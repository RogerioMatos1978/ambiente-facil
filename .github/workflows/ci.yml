name: CI - Ambiente Fácil

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-tests:
    name: Backend (Django) - Lint & Testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Instalar dependências
        run: pip install -r requirements-dev.txt

      - name: Lint (flake8)
        run: flake8 apps config --max-line-length=120 --exclude=migrations

      - name: Checar formatação (black --check)
        run: black --check apps config

      - name: Rodar testes (pytest)
        env:
          DJANGO_SETTINGS_MODULE: config.settings.test
        run: pytest --cov=apps -q

  frontend-build:
    name: Frontend (Next.js) - Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Checagem de tipos
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build de produção
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker-build:
    name: Build das imagens Docker
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build imagem backend (produção)
        run: docker build -f backend/Dockerfile.prod -t ambiente-facil-backend:ci backend

      - name: Build imagem frontend (produção)
        run: docker build -f frontend/Dockerfile.prod -t ambiente-facil-frontend:ci frontend
